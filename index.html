<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useMemo } = React;

// ─── localStorage persistence ─────────────────────────────────────────────
function usePersist(key, initial) {
  const [val, setVal] = useState(() => {
    try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : initial; }
    catch { return initial; }
  });
  useEffect(() => { try { localStorage.setItem(key, JSON.stringify(val)); } catch{} }, [key, val]);
  return [val, setVal];
}

// ─── Constants ───────────────────────────────────────────────────────────────
const COLORS = ["#6366f1","#f59e0b","#10b981","#ef4444","#3b82f6","#8b5cf6","#ec4899","#14b8a6"];
const CATEGORY_ICONS = {"Exam / Certification":"🎯","University / School":"🎓","Language Learning":"🌍","Other":"📚"};
const RESOURCE_TYPES = {"Book":"📖","Video Course":"🎬","Article / PDF":"📄","Podcast":"🎧","Website":"🌐","Other":"📦"};

const defaultSubjects = [
  {id:1,name:"Mathematics",category:"University / School",color:COLORS[0],goal:60},
  {id:2,name:"Spanish",category:"Language Learning",color:COLORS[2],goal:30},
  {id:3,name:"AWS Certification",category:"Exam / Certification",color:COLORS[4],goal:90},
];
const defaultResources = [{
  id:1, subjectId:1, title:"Calculus: Early Transcendentals", type:"Book", author:"James Stewart", color:COLORS[0],
  sections:[{id:101,name:"Part I – Foundations",chapters:[
    {id:1001,name:"Limits & Continuity",topics:[
      {id:10001,name:"Limit Laws",done:true,subtopics:[{id:100001,name:"Algebraic limits",done:true},{id:100002,name:"Squeeze theorem",done:false}]},
      {id:10002,name:"Continuity",done:false,subtopics:[]},
    ]},
    {id:1002,name:"Derivatives",topics:[
      {id:10003,name:"Definition",done:false,subtopics:[{id:100003,name:"From first principles",done:false}]},
      {id:10004,name:"Chain Rule",done:false,subtopics:[]},
    ]}
  ]}]
}];

// ─── Utilities ────────────────────────────────────────────────────────────────
const pad = n => String(n).padStart(2,"0");
const fmt = s => `${pad(Math.floor(s/60))}:${pad(s%60)}`;
const today = () => new Date().toISOString().slice(0,10);
const addDays = (date,n) => { const d=new Date(date); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10); };
const formatMin = m => !m?"0m":m>=60?`${Math.floor(m/60)}h${m%60>0?" "+m%60+"m":""}`:m+"m";
const getWeekDates = () => {
  const d=new Date(),day=d.getDay(),mon=new Date(d);
  mon.setDate(d.getDate()-(day===0?6:day-1));
  return Array.from({length:7},(_,i)=>{const x=new Date(mon);x.setDate(mon.getDate()+i);return x.toISOString().slice(0,10);});
};

// ─── SM-2+ Algorithm ─────────────────────────────────────────────────────────
function sm2Next(card, rating) {
  const prevEf=card.ef||2.5, prevReps=card.reps||0, prevInterval=card.interval||0;
  const againStreak = rating<=1 ? (card.againStreak||0)+1 : 0;
  let ef = prevEf + (0.1-(5-rating)*(0.08+(5-rating)*0.02));
  ef = Math.max(1.3, Math.min(4.0, ef));
  let interval, reps;
  if(rating<=1){interval=1;reps=0;}
  else if(rating===2){interval=Math.max(1,Math.round(prevInterval*1.2));reps=prevReps+1;}
  else {
    if(prevReps===0)interval=1;
    else if(prevReps===1)interval=4;
    else interval=Math.round(prevInterval*ef);
    if(rating===4)interval=Math.round(interval*1.3);
    if(rating===5)interval=Math.round(interval*1.5);
    reps=prevReps+1;
  }
  interval=Math.max(1,interval);
  const due=addDays(today(),interval);
  const isLeech=againStreak>=4;
  return{ef,interval,reps,due,againStreak,isLeech:isLeech||card.isLeech};
}
function urgencyScore(card) {
  const t=today(),due=card.due||t;
  const overdueDays=due<=t?Math.ceil((new Date(t)-new Date(due))/86400000):-1;
  if(overdueDays<0)return -999;
  let score=overdueDays*10;
  score+=(2.5-(card.ef||2.5))*5;
  score+=Math.max(0,5-(card.reps||0));
  if(card.isLeech)score+=20;
  return score;
}
function buildSmartDeck(cards) {
  const t=today();
  return cards.filter(c=>!c.due||c.due<=t).sort((a,b)=>urgencyScore(b)-urgencyScore(a));
}
function cardStats(cards) {
  const t=today(),due=cards.filter(c=>!c.due||c.due<=t);
  return{
    total:cards.length, due:due.length,
    overdue:due.filter(c=>c.due&&c.due<t).length,
    dueToday:due.filter(c=>!c.due||c.due===t).length,
    leeches:cards.filter(c=>c.isLeech).length,
    mature:cards.filter(c=>(c.interval||0)>=21).length,
    young:cards.filter(c=>(c.reps||0)>0&&(c.interval||0)<21).length,
    newCards:cards.filter(c=>(c.reps||0)===0).length,
  };
}
function dueForecast(cards) {
  return getWeekDates().map(d=>({date:d,count:cards.filter(c=>c.due&&c.due<=d&&c.due>=today()).length}));
}

// ─── Styles ────────────────────────────────────────────────────────────────────
const btnStyle=(bg,extra={})=>({background:`linear-gradient(135deg,${bg},${bg}bb)`,border:"none",color:"#fff",padding:"8px 16px",borderRadius:8,cursor:"pointer",fontSize:13,fontWeight:600,...extra});
const inputStyle=()=>({width:"100%",background:"#0f0f1a",border:"1px solid #2a2a4a",color:"#e2e8f0",padding:"9px 11px",borderRadius:8,fontSize:14,marginBottom:12,boxSizing:"border-box",outline:"none"});
const labelStyle={fontSize:12,color:"#94a3b8",display:"block",marginBottom:4,fontWeight:500};
const card=(extra={})=>({background:"#1a1a2e",borderRadius:12,padding:"14px 15px",border:"1px solid #1e1e3f",...extra});
const iconBtn=(extra={})=>({background:"none",border:"none",color:"#475569",cursor:"pointer",padding:"2px 5px",fontSize:13,...extra});

function countLeafNodes(node) {
  if(!node)return{total:0,done:0,pct:0};
  let total=0,done=0;
  (node.sections||[]).forEach(sec=>(sec.chapters||[]).forEach(ch=>(ch.topics||[]).forEach(tp=>{
    if((tp.subtopics||[]).length===0){total++;if(tp.done)done++;}
    (tp.subtopics||[]).forEach(st=>{total++;if(st.done)done++;});
  })));
  return{total,done,pct:total>0?Math.round(done/total*100):0};
}
function updateInTree(resources,resId,fn){return resources.map(r=>r.id===resId?fn(r):r);}

// ════════════════════════════════════════════════════════════════════════════
function StudyPlanner() {
  const [subjects,setSubjects] = usePersist("sf_subjects", defaultSubjects);
  const [sessions,setSessions] = usePersist("sf_sessions", []);
  const [flashcards,setFlashcards] = usePersist("sf_flashcards", []);
  const [resources,setResources] = usePersist("sf_resources", defaultResources);
  const [tab,setTab] = useState("dashboard");

  const [pomActive,setPomActive]=useState(false);
  const [pomSecs,setPomSecs]=useState(25*60);
  const [pomMode,setPomMode]=useState("work");
  const [pomSubject,setPomSubject]=useState(null);
  const [pomCount,setPomCount]=useState(0);
  const [pomCustom,setPomCustom]=useState(25);
  const timerRef=useRef(null);

  const [deck,setDeck]=useState([]);
  const [deckIdx,setDeckIdx]=useState(0);
  const [showAns,setShowAns]=useState(false);
  const [reviewDone,setReviewDone]=useState(false);

  const [modal,setModal]=useState(null);
  const [form,setForm]=useState({});
  const [expanded,setExpanded]=useState({});
  const [resFilter,setResFilter]=useState("all");
  const [fcFilter,setFcFilter]=useState("all");

  const toggle=key=>setExpanded(e=>({...e,[key]:!e[key]}));

  useEffect(()=>{
    if(pomActive){
      timerRef.current=setInterval(()=>setPomSecs(s=>{
        if(s<=1){clearInterval(timerRef.current);setPomActive(false);return 0;}
        return s-1;
      }),1000);
    } else clearInterval(timerRef.current);
    return ()=>clearInterval(timerRef.current);
  },[pomActive]);

  useEffect(()=>{
    if(pomSecs===0&&!pomActive){
      if(pomMode==="work"&&pomSubject)
        setSessions(s=>[{id:Date.now(),subjectId:pomSubject,date:today(),minutes:pomCustom,note:"🍅 Pomodoro"},...s]);
      if(pomMode==="work"){
        const nc=pomCount+1;setPomCount(nc);
        if(nc%4===0){setPomMode("long");setPomSecs(15*60);}
        else{setPomMode("short");setPomSecs(5*60);}
      } else{setPomMode("work");setPomSecs(pomCustom*60);}
    }
  },[pomSecs,pomActive]);

  const smartDeck=useMemo(()=>buildSmartDeck(flashcards),[flashcards]);
  const stats=useMemo(()=>cardStats(flashcards),[flashcards]);
  const forecast=useMemo(()=>dueForecast(flashcards),[flashcards]);

  const todaySess=()=>sessions.filter(s=>s.date===today());
  const todayMin=sid=>todaySess().filter(s=>!sid||s.subjectId===sid).reduce((a,s)=>a+s.minutes,0);
  const weekMin=sid=>{const w=getWeekDates();return sessions.filter(s=>w.includes(s.date)&&(!sid||s.subjectId===sid)).reduce((a,s)=>a+s.minutes,0);};

  function startReview(filter="all"){
    let pool=buildSmartDeck(flashcards);
    if(filter!=="all"&&filter.startsWith("subject:")){const sid=parseInt(filter.split(":")[1]);pool=pool.filter(c=>c.subjectId===sid);}
    else if(filter==="leech")pool=pool.filter(c=>c.isLeech);
    setDeck(pool);setDeckIdx(0);setShowAns(false);setReviewDone(pool.length===0);
  }
  function rateCard(rating){
    const c=deck[deckIdx],upd=sm2Next(c,rating);
    setFlashcards(fc=>fc.map(x=>x.id===c.id?{...x,...upd}:x));
    if(deckIdx+1>=deck.length)setReviewDone(true);
    else{setDeckIdx(i=>i+1);setShowAns(false);}
  }

  const addSubject=()=>{if(!form.name)return;setSubjects(s=>[...s,{id:Date.now(),name:form.name,category:form.category||"Other",color:form.color||COLORS[s.length%COLORS.length],goal:parseInt(form.goal)||60}]);setModal(null);setForm({});};
  const addCard=()=>{if(!form.front||!form.back)return;setFlashcards(fc=>[...fc,{id:Date.now(),subjectId:form.subjectId?parseInt(form.subjectId):null,front:form.front,back:form.back,due:today(),reps:0,interval:0,ef:2.5,againStreak:0,isLeech:false}]);setModal(null);setForm({});};
  const addSession=()=>{if(!form.subjectId||!form.minutes)return;setSessions(ss=>[{id:Date.now(),subjectId:parseInt(form.subjectId),date:form.date||today(),minutes:parseInt(form.minutes),note:form.note||""},...ss]);setModal(null);setForm({});};
  const addResource=()=>{if(!form.title)return;setResources(r=>[...r,{id:Date.now(),subjectId:form.subjectId?parseInt(form.subjectId):null,title:form.title,type:form.type||"Book",author:form.author||"",color:form.color||COLORS[r.length%COLORS.length],sections:[]}]);setModal(null);setForm({});};

  const addSection=(resId,name)=>{if(!name.trim())return;setResources(rs=>updateInTree(rs,resId,r=>({...r,sections:[...r.sections,{id:Date.now(),name,chapters:[]}]})));};
  const deleteSection=(resId,secId)=>setResources(rs=>updateInTree(rs,resId,r=>({...r,sections:r.sections.filter(s=>s.id!==secId)})));
  const addChapter=(resId,secId,name)=>{if(!name.trim())return;setResources(rs=>updateInTree(rs,resId,r=>({...r,sections:r.sections.map(s=>s.id===secId?{...s,chapters:[...s.chapters,{id:Date.now(),name,topics:[]}]}:s)})));};
  const deleteChapter=(resId,secId,chId)=>setResources(rs=>updateInTree(rs,resId,r=>({...r,sections:r.sections.map(s=>s.id===secId?{...s,chapters:s.chapters.filter(c=>c.id!==chId)}:s)})));
  const addTopic=(resId,secId,chId,name)=>{if(!name.trim())return;setResources(rs=>updateInTree(rs,resId,r=>({...r,sections:r.sections.map(s=>s.id===secId?{...s,chapters:s.chapters.map(c=>c.id===chId?{...c,topics:[...c.topics,{id:Date.now(),name,done:false,subtopics:[]}]}:c)}:s)})));};
  const toggleTopic=(resId,secId,chId,tpId)=>setResources(rs=>updateInTree(rs,resId,r=>({...r,sections:r.sections.map(s=>s.id===secId?{...s,chapters:s.chapters.map(c=>c.id===chId?{...c,topics:c.topics.map(t=>t.id===tpId?{...t,done:!t.done,subtopics:t.subtopics.map(st=>({...st,done:!t.done}))}:t)}:c)}:s)})));
  const deleteTopic=(resId,secId,chId,tpId)=>setResources(rs=>updateInTree(rs,resId,r=>({...r,sections:r.sections.map(s=>s.id===secId?{...s,chapters:s.chapters.map(c=>c.id===chId?{...c,topics:c.topics.filter(t=>t.id!==tpId)}:c)}:s)})));
  const addSubtopic=(resId,secId,chId,tpId,name)=>{if(!name.trim())return;setResources(rs=>updateInTree(rs,resId,r=>({...r,sections:r.sections.map(s=>s.id===secId?{...s,chapters:s.chapters.map(c=>c.id===chId?{...c,topics:c.topics.map(t=>t.id===tpId?{...t,subtopics:[...t.subtopics,{id:Date.now(),name,done:false}]}:t)}:c)}:s)})));};
  const toggleSubtopic=(resId,secId,chId,tpId,stId)=>setResources(rs=>updateInTree(rs,resId,r=>({...r,sections:r.sections.map(s=>s.id===secId?{...s,chapters:s.chapters.map(c=>c.id===chId?{...c,topics:c.topics.map(t=>t.id===tpId?{...t,subtopics:t.subtopics.map(st=>st.id===stId?{...st,done:!st.done}:st)}:t)}:c)}:s)})));
  const deleteSubtopic=(resId,secId,chId,tpId,stId)=>setResources(rs=>updateInTree(rs,resId,r=>({...r,sections:r.sections.map(s=>s.id===secId?{...s,chapters:s.chapters.map(c=>c.id===chId?{...c,topics:c.topics.map(t=>t.id===tpId?{...t,subtopics:t.subtopics.filter(st=>st.id!==stId)}:t)}:c)}:s)})));
  const clearLeech=id=>setFlashcards(fc=>fc.map(c=>c.id===id?{...c,isLeech:false,againStreak:0}:c));

  const weekDates=getWeekDates();
  const dayLabels=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
  const greet=new Date().getHours()<12?"morning":new Date().getHours()<17?"afternoon":"evening";

  const AddRow=({placeholder,onAdd,btnColor="#4f46e5"})=>{
    const [val,setVal]=useState("");
    return(
      <div style={{display:"flex",gap:6,marginBottom:8}}>
        <input value={val} onChange={e=>setVal(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"){onAdd(val);setVal("");}}} placeholder={placeholder} style={{...inputStyle(),marginBottom:0,flex:1,fontSize:12,padding:"6px 9px"}}/>
        <button onClick={()=>{onAdd(val);setVal("");}} style={btnStyle(btnColor,{padding:"6px 11px",fontSize:11,flexShrink:0})}>Add</button>
      </div>
    );
  };
  const ProgressBar=({pct,color,height=5})=>(
    <div style={{background:"#0f0f1a",borderRadius:99,height,overflow:"hidden"}}>
      <div style={{width:`${pct}%`,height:"100%",background:pct>=100?"#10b981":color,borderRadius:99,transition:"width .4s"}}/>
    </div>
  );

  return (
    <div style={{fontFamily:"'Inter',system-ui,sans-serif",minHeight:"100vh",minHeight:"100dvh",background:"#0f0f1a",color:"#e2e8f0",paddingBottom:16}}>

      {/* HEADER */}
      <div style={{background:"linear-gradient(135deg,#1a1040,#2d1b6b)",padding:"env(safe-area-inset-top,0) 18px 13px",paddingTop:`max(env(safe-area-inset-top,0px),13px)`,display:"flex",alignItems:"center",justifyContent:"space-between",boxShadow:"0 4px 24px rgba(0,0,0,.5)",position:"sticky",top:0,zIndex:100}}>
        <div style={{display:"flex",alignItems:"center",gap:9}}>
          <span style={{fontSize:24}}>📖</span>
          <div><div style={{fontWeight:800,fontSize:17,color:"#c7d2fe",letterSpacing:-.3}}>StudyFlow</div><div style={{fontSize:9,color:"#818cf8"}}>Personal Study Planner</div></div>
        </div>
        <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
          <span style={{background:"rgba(99,102,241,.2)",borderRadius:20,padding:"3px 9px",fontSize:11,color:"#a5b4fc"}}>📅 {new Date().toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"})}</span>
          {stats.due>0&&<span onClick={()=>{setTab("flashcards");startReview();}} style={{background:"#dc2626",borderRadius:20,padding:"3px 9px",fontSize:11,color:"#fff",cursor:"pointer"}}>🃏 {stats.due}</span>}
          {stats.leeches>0&&<span onClick={()=>{setTab("flashcards");startReview("leech");}} style={{background:"#7c3aed",borderRadius:20,padding:"3px 9px",fontSize:11,color:"#fff",cursor:"pointer"}}>⚠️ {stats.leeches}</span>}
        </div>
      </div>

      {/* NAV */}
      <div style={{display:"flex",gap:2,padding:"5px 10px",background:"#13131f",borderBottom:"1px solid #1e1e3f",overflowX:"auto",position:"sticky",top:56,zIndex:99}}>
        {[["dashboard","📊","Dashboard"],["resources","📖","Resources"],["flashcards","🃏","Cards"],["pomodoro","⏱️","Timer"],["subjects","📚","Subjects"],["sessions","📝","Sessions"],["progress","📈","Progress"]].map(([id,icon,label])=>(
          <button key={id} onClick={()=>setTab(id)} style={{padding:"6px 10px",borderRadius:8,border:"none",cursor:"pointer",fontSize:12,fontWeight:500,whiteSpace:"nowrap",background:tab===id?"linear-gradient(135deg,#4f46e5,#7c3aed)":"transparent",color:tab===id?"#fff":"#94a3b8",transition:"all .15s",flexShrink:0}}>{icon} {label}</button>
        ))}
      </div>

      <div style={{padding:14,maxWidth:900,margin:"0 auto"}}>

        {/* ══ DASHBOARD ══ */}
        {tab==="dashboard"&&<div>
          <h2 style={{margin:"0 0 12px",color:"#c7d2fe",fontSize:16}}>Good {greet}! 👋</h2>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(135px,1fr))",gap:8,marginBottom:14}}>
            {[{l:"Today's Study",v:formatMin(todayMin()),i:"⏱️",c:"#6366f1"},{l:"Cards Due",v:stats.due,i:"🃏",c:stats.due>0?"#ef4444":"#10b981"},{l:"Leeches",v:stats.leeches,i:"⚠️",c:stats.leeches>0?"#7c3aed":"#10b981"}].map(s=>(
              <div key={s.l} style={card({border:`1px solid ${s.c}22`})}>
                <div style={{fontSize:18,marginBottom:2}}>{s.i}</div>
                <div style={{fontSize:20,fontWeight:700,color:s.c}}>{s.v}</div>
                <div style={{fontSize:10,color:"#64748b",marginTop:1}}>{s.l}</div>
              </div>
            ))}
          </div>
          {stats.due>0&&<div style={card({background:"linear-gradient(135deg,#1e1040,#2a1860)",border:"1px solid #4f46e5",marginBottom:12})}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
              <div>
                <div style={{fontWeight:700,color:"#c7d2fe",fontSize:14}}>🧠 Smart Review Ready</div>
                <div style={{fontSize:12,color:"#818cf8",marginTop:2}}>
                  {stats.overdue>0&&<span style={{color:"#ef4444",marginRight:8}}>⏰ {stats.overdue} overdue</span>}
                  <span>{stats.dueToday} due today · {stats.leeches} leeches</span>
                </div>
              </div>
              <button onClick={()=>{setTab("flashcards");startReview();}} style={btnStyle("#4f46e5",{padding:"8px 18px"})}>Start Review →</button>
            </div>
          </div>}

          </div>

                <div style={{display:"flex",justifyContent:"space-between",marginBottom:5,alignItems:"center"}}>
                  <div style={{display:"flex",alignItems:"center",gap:6}}><div style={{width:7,height:7,borderRadius:"50%",background:sub.color}}/><span style={{fontWeight:600,fontSize:12}}>{sub.name}</span></div>
                  <span style={{fontSize:11,color:pct>=100?"#10b981":"#94a3b8"}}>{formatMin(done)}/{formatMin(goal)}</span>

        </div>}

        {/* ══ RESOURCES ══ */}
        {tab==="resources"&&<div>

                    <div style={{display:"flex",gap:5,flexShrink:0}}>
                      <button onClick={()=>toggle(`res-${res.id}`)} style={btnStyle(resOpen?"#374151":"#4f46e5",{padding:"4px 9px",fontSize:11})}>{resOpen?"▲":"▼"}</button>
                      <button onClick={()=>setResources(r=>r.filter(x=>x.id!==res.id))} style={iconBtn({fontSize:14})}>🗑</button>
                    </div>
                  </div>
                  <div style={{display:"flex",gap:5,marginTop:5,flexWrap:"wrap"}}>
                    <span style={{fontSize:9,color:"#94a3b8",background:"#0f0f1a",borderRadius:3,padding:"1px 6px"}}>{res.type}</span>
                    {sub&&<span style={{fontSize:9,color:sub.color,background:`${sub.color}18`,borderRadius:3,padding:"1px 6px"}}>{sub.name}</span>}
                    {prog.total>0&&<span style={{fontSize:9,color:prog.pct===100?"#10b981":"#94a3b8"}}>{prog.done}/{prog.total} · {prog.pct}%</span>}
                  </div>
                  {prog.total>0&&<div style={{marginTop:6}}><ProgressBar pct={prog.pct} color={res.color} height={4}/></div>}
                </div>
              </div>
              {resOpen&&<div style={{marginTop:12,borderTop:"1px solid #1e1e3f",paddingTop:11}}>
                <AddRow placeholder="+ Add section..." onAdd={name=>addSection(res.id,name)} btnColor="#6366f1"/>
                {res.sections.map(sec=>{
                  const secOpen=expanded[`sec-${sec.id}`];
                  const secDone=sec.chapters.flatMap(c=>c.topics).flatMap(t=>t.subtopics.length?t.subtopics:[t]).filter(x=>x.done).length;
                  const secTotal=sec.chapters.flatMap(c=>c.topics).flatMap(t=>t.subtopics.length?t.subtopics:[t]).length;
                  return(<div key={sec.id} style={{background:"#13131f",borderRadius:9,padding:"9px 11px",marginBottom:7,border:"1px solid #1e1e3f"}}>
                    <div style={{display:"flex",alignItems:"center",gap:7,cursor:"pointer"}} onClick={()=>toggle(`sec-${sec.id}`)}>
                      <span style={{fontSize:12,color:"#6366f1"}}>{secOpen?"▼":"▶"}</span>
                      <span style={{fontWeight:700,fontSize:13,flex:1,color:"#c7d2fe"}}>📂 {sec.name}</span>
                      {secTotal>0&&<span style={{fontSize:10,color:"#64748b"}}>{secDone}/{secTotal}</span>}
                      {secTotal>0&&<div style={{width:50,background:"#1e1e3f",borderRadius:99,height:4,overflow:"hidden"}}><div style={{width:`${secTotal>0?Math.round(secDone/secTotal*100):0}%`,height:"100%",background:"#6366f1",borderRadius:99}}/></div>}
                      <button onClick={e=>{e.stopPropagation();deleteSection(res.id,sec.id);}} style={iconBtn()}>✕</button>

                    {secOpen&&<div style={{marginTop:9,paddingTop:8,borderTop:"1px solid #1e1e3f20"}}>

                        return(<div key={ch.id} style={{background:"#0f0f1a",borderRadius:8,padding:"8px 10px",marginBottom:6,border:"1px solid #1e1e3f"}}>

                            {chTotal>0&&<span style={{fontSize:9,color:"#64748b"}}>{chDone}/{chTotal}</span>}
                            {chTotal>0&&<div style={{width:40,background:"#1e1e3f",borderRadius:99,height:3,overflow:"hidden"}}><div style={{width:`${chTotal>0?Math.round(chDone/chTotal*100):0}%`,height:"100%",background:"#f59e0b",borderRadius:99}}/></div>}
                            <button onClick={e=>{e.stopPropagation();deleteChapter(res.id,sec.id,ch.id);}} style={iconBtn({fontSize:11})}>✕</button>
                          </div>
                          {chOpen&&<div style={{marginTop:8,paddingTop:7,borderTop:"1px solid #1e1e3f20"}}>
                            <AddRow placeholder="+ Add topic..." onAdd={name=>addTopic(res.id,sec.id,ch.id,name)} btnColor="#10b981"/>
                            {ch.topics.map(tp=>{
                              const tpOpen=expanded[`tp-${tp.id}`],allSubDone=tp.subtopics.length>0&&tp.subtopics.every(s=>s.done);
                              return(<div key={tp.id} style={{marginBottom:5}}>
                                <div style={{display:"flex",alignItems:"center",gap:6,padding:"3px 0"}}>
                                  <div onClick={()=>toggleTopic(res.id,sec.id,ch.id,tp.id)} style={{width:15,height:15,borderRadius:4,border:`2px solid ${tp.done||allSubDone?"#10b981":res.color}`,background:tp.done||allSubDone?"#10b981":"transparent",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0}}>{(tp.done||allSubDone)&&<span style={{fontSize:8,color:"#fff",fontWeight:700}}>✓</span>}</div>

                          </div>}
                        </div>);

                    </div>}
                  </div>);
                })}
                {!res.sections.length&&<div style={{fontSize:12,color:"#475569",textAlign:"center",padding:10}}>No sections yet</div>}
              </div>}
            </div>);
          })}
          {!resources.length&&<div style={{color:"#475569",textAlign:"center",padding:40}}>No resources yet. Add a book or course! 📖</div>}
        </div>}

        {/* ══ FLASHCARDS ══ */}
        {tab==="flashcards"&&<div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:11,flexWrap:"wrap",gap:7}}>
            <h2 style={{margin:0,color:"#c7d2fe",fontSize:16}}>🃏 Flashcards</h2>
            <button onClick={()=>{setModal("addCard");setForm({subjectId:subjects[0]?.id});}} style={btnStyle("#4f46e5")}>+ Add Card</button>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(100px,1fr))",gap:7,marginBottom:12}}>
            {[{l:"Due",v:stats.due,c:"#ef4444",onClick:()=>startReview()},{l:"Mature",v:stats.mature,c:"#10b981"},{l:"Young",v:stats.young,c:"#f59e0b"},{l:"New",v:stats.newCards,c:"#6366f1"},{l:"Leeches ⚠️",v:stats.leeches,c:"#7c3aed",onClick:()=>startReview("leech")}].map(s=>(
              <div key={s.l} onClick={s.onClick} style={card({border:`1px solid ${s.c}22`,cursor:s.onClick?"pointer":"default",textAlign:"center"})}>

            ))}
          </div>
          <div style={{display:"flex",gap:5,marginBottom:10,overflowX:"auto",paddingBottom:3}}>

          </div>
          {deck.length>0&&!reviewDone&&<div style={card({border:"1px solid #4f46e5",marginBottom:14,textAlign:"center"})}>

            </div>
            <div style={{background:"#0f0f1a",borderRadius:99,height:3,marginBottom:14,overflow:"hidden"}}><div style={{width:`${(deckIdx/deck.length)*100}%`,height:"100%",background:"#4f46e5",borderRadius:99}}/></div>
            <div style={{background:"#0f0f1a",borderRadius:12,padding:"22px 16px",minHeight:80,display:"flex",alignItems:"center",justifyContent:"center",marginBottom:12,fontSize:16,fontWeight:600}}>{deck[deckIdx]?.front}</div>
            {!showAns?<button onClick={()=>setShowAns(true)} style={btnStyle("#4f46e5",{padding:"9px 28px"})}>Show Answer</button>:
            <div>
              <div style={{background:"#0c2a1a",border:"1px solid #10b981",borderRadius:10,padding:"16px",marginBottom:12,fontSize:14,color:"#6ee7b7"}}>{deck[deckIdx]?.back}</div>
              <div style={{fontSize:11,color:"#64748b",marginBottom:7}}>How well did you remember?</div>
              <div style={{display:"flex",gap:6,justifyContent:"center",flexWrap:"wrap"}}>
                {[[1,"😖","Again","#ef4444"],[2,"😕","Hard","#f59e0b"],[3,"🙂","Good","#10b981"],[4,"😄","Easy","#6366f1"],[5,"🤩","Perfect","#8b5cf6"]].map(([r,ico,label,col])=>(
                  <button key={r} onClick={()=>rateCard(r)} style={btnStyle(col,{padding:"6px 10px",display:"flex",flexDirection:"column",alignItems:"center",gap:1})}>
                    <span style={{fontSize:17}}>{ico}</span><span style={{fontSize:10,fontWeight:700}}>{label}</span>

            </div>}
          </div>}
          {reviewDone&&<div style={{background:deck.length===0?"#1a1a2e":"#0c2a1a",border:`1px solid ${deck.length===0?"#1e1e3f":"#10b981"}`,borderRadius:10,padding:14,marginBottom:12,textAlign:"center",color:deck.length===0?"#64748b":"#6ee7b7"}}>
            {deck.length===0?"🎉 No cards due! Come back tomorrow.":"✅ Review complete! Great work."}

            {flashcards.map(c=>{const sub=subjects.find(x=>x.id===c.subjectId),isDue=!c.due||c.due<=today(),isOverdue=c.due&&c.due<today();return(
              <div key={c.id} style={card({border:`1px solid ${c.isLeech?"#7c3aed44":isDue?"#ef444430":"#1e1e3f"}`})}>

                  <div style={{flex:1}}><div style={{fontWeight:600,fontSize:13,marginBottom:2}}>{c.front}</div><div style={{fontSize:11,color:"#64748b"}}>{c.back}</div></div>

                    {c.isLeech&&<span style={{fontSize:8,background:"#7c3aed",color:"#fff",padding:"1px 5px",borderRadius:3}}>⚠️</span>}
                    {isOverdue&&<span style={{fontSize:8,background:"#dc2626",color:"#fff",padding:"1px 5px",borderRadius:3}}>overdue</span>}

                </div>
              </div>
            );})}
            {!flashcards.length&&<div style={{color:"#475569",textAlign:"center",padding:40}}>No flashcards yet. Add some! 🃏</div>}

        {/* ══ POMODORO ══ */}

              <div style={{fontSize:10,color:"#64748b",textTransform:"uppercase",letterSpacing:1}}>{pomMode==="work"?"Focus":pomMode==="short"?"Break":"Long Break"}</div>
            </div>

          <select value={pomSubject||""} onChange={e=>setPomSubject(parseInt(e.target.value)||null)} style={{...inputStyle(),marginBottom:9}}>
            <option value="">— Select subject —</option>
            {subjects.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
          </select>
          <div style={{display:"flex",gap:7,justifyContent:"center",alignItems:"center",marginBottom:14}}>
            <span style={{fontSize:11,color:"#94a3b8"}}>Work:</span>
            <input type="number" min="1" max="90" value={pomCustom} onChange={e=>{const v=parseInt(e.target.value)||25;setPomCustom(v);if(!pomActive&&pomMode==="work")setPomSecs(v*60);}} style={{...inputStyle(),width:50,textAlign:"center",marginBottom:0,fontSize:12}}/>
            <span style={{fontSize:11,color:"#94a3b8"}}>min</span>
          </div>
          <div style={{display:"flex",gap:9,justifyContent:"center"}}>

            :<button onClick={()=>setPomActive(false)} style={btnStyle("#f59e0b",{padding:"10px 30px",fontSize:15})}>⏸ Pause</button>}
            <button onClick={()=>{setPomActive(false);setPomMode("work");setPomSecs(pomCustom*60);}} style={btnStyle("#475569",{padding:"10px 16px"})}>↺</button>
          </div>
          {todaySess().length>0&&<div style={{marginTop:16,...card(),textAlign:"left"}}>
            <div style={{fontSize:11,color:"#a5b4fc",marginBottom:6,fontWeight:600}}>Today's Sessions</div>
            {todaySess().slice(0,5).map(s=>{const sub=subjects.find(x=>x.id===s.subjectId);return(
              <div key={s.id} style={{display:"flex",justifyContent:"space-between",padding:"2px 0",fontSize:11,borderBottom:"1px solid #1e1e3f15"}}>
                <span style={{color:sub?.color||"#94a3b8"}}>{sub?.name||"?"}</span>
                <span style={{color:"#64748b"}}>{formatMin(s.minutes)}</span>
              </div>
            );})}
          </div>}
        </div>}

        {/* ══ SUBJECTS ══ */}
        {tab==="subjects"&&<div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <h2 style={{margin:0,color:"#c7d2fe",fontSize:16}}>📚 Subjects</h2>
            <button onClick={()=>{setModal("addSubject");setForm({category:"University / School",color:COLORS[subjects.length%COLORS.length],goal:60});}} style={btnStyle("#4f46e5")}>+ Add Subject</button>
          </div>
          <div style={{display:"grid",gap:9}}>
            {subjects.map(sub=>{const wm=weekMin(sub.id),tm=todayMin(sub.id),subCards=flashcards.filter(c=>c.subjectId===sub.id),subRes=resources.filter(r=>r.subjectId===sub.id);return(
              <div key={sub.id} style={card({border:`1px solid ${sub.color}22`,borderLeft:`4px solid ${sub.color}`})}>
                <div style={{display:"flex",justifyContent:"space-between"}}>
                  <div><div style={{display:"flex",alignItems:"center",gap:6,marginBottom:2}}><span style={{fontSize:15}}>{CATEGORY_ICONS[sub.category]||"📚"}</span><span style={{fontWeight:700,fontSize:14}}>{sub.name}</span></div><div style={{fontSize:10,color:"#64748b"}}>{sub.category}</div></div>
                  <button onClick={()=>setSubjects(s=>s.filter(x=>x.id!==sub.id))} style={iconBtn({fontSize:14})}>🗑</button>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:5,marginTop:9}}>
                  {[["Today",formatMin(tm)],["Week",formatMin(wm)],["Cards",subCards.length],["Resources",subRes.length]].map(([l,v])=>(
                    <div key={l} style={{background:"#0f0f1a",borderRadius:6,padding:"5px",textAlign:"center"}}><div style={{fontWeight:700,color:sub.color,fontSize:13}}>{v}</div><div style={{fontSize:9,color:"#64748b"}}>{l}</div></div>
                  ))}
                </div>
                <div style={{marginTop:8}}>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:"#64748b",marginBottom:2}}><span>Daily: {formatMin(sub.goal)}</span><span>{Math.min(100,Math.round(tm/(sub.goal||60)*100))}%</span></div>
                  <ProgressBar pct={Math.min(100,Math.round(tm/(sub.goal||60)*100))} color={sub.color}/>
                </div>
              </div>
            );})}
          </div>
        </div>}

        {/* ══ SESSIONS ══ */}
        {tab==="sessions"&&<div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <h2 style={{margin:0,color:"#c7d2fe",fontSize:16}}>📝 Study Sessions</h2>
            <button onClick={()=>{setModal("addSession");setForm({date:today()});}} style={btnStyle("#4f46e5")}>+ Log Session</button>
          </div>
          {!sessions.length&&<div style={{color:"#475569",textAlign:"center",padding:40}}>No sessions yet. Start studying! 📚</div>}
          <div style={{display:"grid",gap:6}}>
            {sessions.slice(0,60).map(s=>{const sub=subjects.find(x=>x.id===s.subjectId);return(
              <div key={s.id} style={{...card(),display:"flex",alignItems:"center",gap:9}}>
                <div style={{width:7,height:7,borderRadius:"50%",background:sub?.color||"#475569",flexShrink:0}}/>
                <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600,color:sub?.color||"#94a3b8"}}>{sub?.name||"Unknown"}</div>{s.note&&<div style={{fontSize:10,color:"#64748b"}}>{s.note}</div>}</div>
                <div style={{textAlign:"right"}}><div style={{fontSize:13,fontWeight:600}}>{formatMin(s.minutes)}</div><div style={{fontSize:10,color:"#475569"}}>{s.date}</div></div>
                <button onClick={()=>setSessions(ss=>ss.filter(x=>x.id!==s.id))} style={iconBtn()}>✕</button>
              </div>
            );})}
          </div>
        </div>}

        {/* ══ PROGRESS ══ */}
        {tab==="progress"&&<div>
          <h2 style={{color:"#c7d2fe",marginBottom:12,fontSize:16}}>📈 Progress & Analytics</h2>
          <div style={card({marginBottom:12})}>
            <div style={{fontWeight:600,color:"#a5b4fc",marginBottom:10,fontSize:12}}>Weekly Study Time</div>
            <div style={{display:"flex",alignItems:"flex-end",gap:6,height:90}}>
              {weekDates.map((d,i)=>{const mins=sessions.filter(s=>s.date===d).reduce((a,s)=>a+s.minutes,0),maxM=Math.max(1,...weekDates.map(dd=>sessions.filter(s=>s.date===dd).reduce((a,s)=>a+s.minutes,0))),h=Math.max(3,(mins/maxM)*75),isToday=d===today();return(
                <div key={d} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                  {mins>0&&<div style={{fontSize:8,color:"#94a3b8"}}>{formatMin(mins)}</div>}
                  <div style={{width:"100%",height:`${h}px`,background:isToday?"linear-gradient(180deg,#818cf8,#4f46e5)":"linear-gradient(180deg,#334155,#1e293b)",borderRadius:"3px 3px 0 0",minHeight:3}}/>
                  <div style={{fontSize:9,color:isToday?"#818cf8":"#475569"}}>{dayLabels[i]}</div>
                </div>
              );})}
            </div>
          </div>
          <div style={card({marginBottom:12})}>
            <div style={{fontWeight:600,color:"#a5b4fc",marginBottom:10,fontSize:12}}>Subject Breakdown</div>
            {subjects.map(sub=>{const mins=weekMin(sub.id),total=weekMin(),pct=total>0?Math.round(mins/total*100):0;return(
              <div key={sub.id} style={{marginBottom:7}}>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:2}}><span style={{color:sub.color,fontWeight:600}}>{sub.name}</span><span style={{color:"#94a3b8"}}>{formatMin(mins)} ({pct}%)</span></div>
                <ProgressBar pct={pct} color={sub.color} height={6}/>
              </div>
            );})}
            {weekMin()===0&&<div style={{color:"#475569",textAlign:"center",padding:12,fontSize:12}}>No sessions this week yet!</div>}
          </div>
          <div style={card({marginBottom:12})}>
            <div style={{fontWeight:600,color:"#a5b4fc",marginBottom:10,fontSize:12}}>🧠 Flashcard Health</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(110px,1fr))",gap:7}}>
              {[{l:"Mature (21d+)",v:stats.mature,c:"#10b981"},{l:"Young",v:stats.young,c:"#f59e0b"},{l:"New",v:stats.newCards,c:"#6366f1"},{l:"Leeches",v:stats.leeches,c:"#7c3aed"}].map(s=>(
                <div key={s.l} style={{background:"#0f0f1a",borderRadius:8,padding:"8px",textAlign:"center"}}><div style={{fontSize:16,fontWeight:700,color:s.c}}>{s.v}</div><div style={{fontSize:9,color:"#64748b"}}>{s.l}</div></div>
              ))}
            </div>
          </div>
          {resources.length>0&&<div style={card({marginBottom:12})}>
            <div style={{fontWeight:600,color:"#a5b4fc",marginBottom:10,fontSize:12}}>Resource Completion</div>
            {resources.map(res=>{const p=countLeafNodes(res);return p.total>0?(<div key={res.id} style={{marginBottom:7}}>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:2}}><span style={{color:res.color,fontWeight:600}}>{RESOURCE_TYPES[res.type]} {res.title}</span><span style={{color:p.pct===100?"#10b981":"#94a3b8"}}>{p.done}/{p.total} ({p.pct}%)</span></div>
              <ProgressBar pct={p.pct} color={res.color} height={5}/>
            </div>):null;})}
          </div>}
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(110px,1fr))",gap:7}}>
            {[{l:"Sessions",v:sessions.length,i:"📝"},{l:"Study Time",v:formatMin(sessions.reduce((a,s)=>a+s.minutes,0)),i:"⏱️"},{l:"Flashcards",v:flashcards.length,i:"🃏"},{l:"Resources",v:resources.length,i:"📖"},{l:"Subjects",v:subjects.length,i:"📚"}].map(s=>(
              <div key={s.l} style={card({textAlign:"center"})}><div style={{fontSize:17}}>{s.i}</div><div style={{fontSize:16,fontWeight:700,color:"#c7d2fe",margin:"2px 0"}}>{s.v}</div><div style={{fontSize:9,color:"#64748b"}}>{s.l}</div></div>
            ))}
          </div>
        </div>}

      </div>

      {/* ══ MODALS ══ */}
      {modal&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.78)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:14}} onClick={e=>{if(e.target===e.currentTarget)setModal(null);}}>
        <div style={{background:"#1a1a2e",borderRadius:14,padding:18,width:"100%",maxWidth:370,border:"1px solid #312e81",boxShadow:"0 20px 60px rgba(0,0,0,.6)",maxHeight:"90dvh",overflowY:"auto"}}>
          {modal==="addSubject"&&<>
            <h3 style={{margin:"0 0 12px",color:"#c7d2fe"}}>Add Subject</h3>
            <label style={labelStyle}>Name</label><input placeholder="e.g. Calculus II" value={form.name||""} onChange={e=>setForm(f=>({...f,name:e.target.value}))} style={inputStyle()}/>
            <label style={labelStyle}>Category</label><select value={form.category||"Other"} onChange={e=>setForm(f=>({...f,category:e.target.value}))} style={inputStyle()}>{Object.keys(CATEGORY_ICONS).map(c=><option key={c}>{c}</option>)}</select>
            <label style={labelStyle}>Daily Goal (min)</label><input type="number" min="5" value={form.goal||60} onChange={e=>setForm(f=>({...f,goal:e.target.value}))} style={inputStyle()}/>
            <label style={labelStyle}>Color</label><div style={{display:"flex",gap:6,marginBottom:12}}>{COLORS.map(c=><div key={c} onClick={()=>setForm(f=>({...f,color:c}))} style={{width:20,height:20,borderRadius:"50%",background:c,cursor:"pointer",border:form.color===c?"3px solid #fff":"3px solid transparent"}}/>)}</div>
            <div style={{display:"flex",gap:7}}><button onClick={addSubject} style={btnStyle("#4f46e5",{flex:1})}>Add</button><button onClick={()=>setModal(null)} style={btnStyle("#475569",{flex:1})}>Cancel</button></div>
          </>}
          {modal==="addResource"&&<>
            <h3 style={{margin:"0 0 12px",color:"#c7d2fe"}}>Add Resource</h3>
            <label style={labelStyle}>Title</label><input placeholder="e.g. Clean Code" value={form.title||""} onChange={e=>setForm(f=>({...f,title:e.target.value}))} style={inputStyle()}/>
            <label style={labelStyle}>Type</label><select value={form.type||"Book"} onChange={e=>setForm(f=>({...f,type:e.target.value}))} style={inputStyle()}>{Object.keys(RESOURCE_TYPES).map(t=><option key={t}>{t}</option>)}</select>
            <label style={labelStyle}>Author / Creator</label><input placeholder="optional" value={form.author||""} onChange={e=>setForm(f=>({...f,author:e.target.value}))} style={inputStyle()}/>
            <label style={labelStyle}>Subject</label><select value={form.subjectId||""} onChange={e=>setForm(f=>({...f,subjectId:e.target.value}))} style={inputStyle()}><option value="">— None —</option>{subjects.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}</select>
            <label style={labelStyle}>Color</label><div style={{display:"flex",gap:6,marginBottom:12}}>{COLORS.map(c=><div key={c} onClick={()=>setForm(f=>({...f,color:c}))} style={{width:20,height:20,borderRadius:"50%",background:c,cursor:"pointer",border:form.color===c?"3px solid #fff":"3px solid transparent"}}/>)}</div>
            <div style={{display:"flex",gap:7}}><button onClick={addResource} style={btnStyle("#4f46e5",{flex:1})}>Add</button><button onClick={()=>setModal(null)} style={btnStyle("#475569",{flex:1})}>Cancel</button></div>
          </>}
          {modal==="addCard"&&<>
            <h3 style={{margin:"0 0 12px",color:"#c7d2fe"}}>Add Flashcard</h3>
            <label style={labelStyle}>Subject</label><select value={form.subjectId||""} onChange={e=>setForm(f=>({...f,subjectId:parseInt(e.target.value)}))} style={inputStyle()}>{subjects.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}</select>
            <label style={labelStyle}>Front (Question)</label><textarea placeholder="What is...?" value={form.front||""} onChange={e=>setForm(f=>({...f,front:e.target.value}))} style={{...inputStyle(),minHeight:55,resize:"vertical"}}/>
            <label style={labelStyle}>Back (Answer)</label><textarea placeholder="The answer is..." value={form.back||""} onChange={e=>setForm(f=>({...f,back:e.target.value}))} style={{...inputStyle(),minHeight:55,resize:"vertical"}}/>
            <div style={{display:"flex",gap:7}}><button onClick={addCard} style={btnStyle("#4f46e5",{flex:1})}>Add Card</button><button onClick={()=>setModal(null)} style={btnStyle("#475569",{flex:1})}>Cancel</button></div>
          </>}
          {modal==="addSession"&&<>
            <h3 style={{margin:"0 0 12px",color:"#c7d2fe"}}>Log Study Session</h3>
            <label style={labelStyle}>Subject</label><select value={form.subjectId||""} onChange={e=>setForm(f=>({...f,subjectId:parseInt(e.target.value)}))} style={inputStyle()}><option value="">Select...</option>{subjects.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}</select>
            <label style={labelStyle}>Date</label><input type="date" value={form.date||today()} onChange={e=>setForm(f=>({...f,date:e.target.value}))} style={inputStyle()}/>
            <label style={labelStyle}>Duration (minutes)</label><input type="number" min="1" placeholder="e.g. 45" value={form.minutes||""} onChange={e=>setForm(f=>({...f,minutes:e.target.value}))} style={inputStyle()}/>
            <label style={labelStyle}>Note</label><input placeholder="optional" value={form.note||""} onChange={e=>setForm(f=>({...f,note:e.target.value}))} style={inputStyle()}/>
            <div style={{display:"flex",gap:7}}><button onClick={addSession} style={btnStyle("#4f46e5",{flex:1})}>Log</button><button onClick={()=>setModal(null)} style={btnStyle("#475569",{flex:1})}>Cancel</button></div>
          </>}
        </div>
      </div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(StudyPlanner));
</script>

<script>
// ── Service Worker ────────────────────────────────────────────────────────────
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js").then(reg => {
      console.log("SW registered:", reg.scope);
    }).catch(err => console.log("SW registration failed:", err));
  });
}

// ── PWA Install Prompt ────────────────────────────────────────────────────────
let deferredPrompt = null;
const banner = document.getElementById("install-banner");
const installBtn = document.getElementById("install-btn");
const dismissBtn = document.getElementById("dismiss-btn");

window.addEventListener("beforeinstallprompt", e => {
  e.preventDefault();
  deferredPrompt = e;
  // Show banner after 3 seconds if not already installed
  setTimeout(() => { if (banner) banner.style.display = "flex"; }, 3000);
});

if (installBtn) {
  installBtn.addEventListener("click", async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    console.log("Install outcome:", outcome);
    deferredPrompt = null;
    banner.style.display = "none";
  });
}
if (dismissBtn) {
  dismissBtn.addEventListener("click", () => { banner.style.display = "none"; });
}

window.addEventListener("appinstalled", () => {
  console.log("StudyFlow installed as PWA!");
  if (banner) banner.style.display = "none";
});
</script>
</body>
</html>
